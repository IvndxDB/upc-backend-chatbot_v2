<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataBunker Price Checker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo-container">
        <img src="../icons/icon32.png" alt="DataBunker" class="logo">
        <h1>DataBunker Price Checker</h1>
      </div>
    </header>

    <!-- Chat Container -->
    <div class="chat-container">
      <div id="messages" class="messages">
        <!-- Messages will appear here -->
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="Escribe el nombre del producto o pega informacion..."
          rows="1"
        ></textarea>
        <div class="input-actions">
<button id="sendBtn" class="send-btn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>

<!-- Activation Screen (shown when no API key is saved) -->
    <div id="activationScreen" class="activation-screen hidden">
      <div class="activation-content">
        <img src="../icons/icon48.png" alt="DataBunker" class="activation-logo">
        <h2>DataBunker Price Checker</h2>
        <p class="activation-subtitle">Ingresa tu clave de acceso para continuar</p>
        <div class="activation-input-wrapper">
          <input type="text" id="apiKeyInput" class="activation-input" placeholder="Pega tu clave aquí...">
        </div>
        <button id="activateBtn" class="activation-btn" disabled>Activar</button>
        <p class="activation-hint">Solicita tu clave de acceso al administrador</p>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="loading-content">
        <div class="spinner"></div>
        <p id="loadingText">Buscando precios...</p>
      </div>
    </div>

    <!-- Product Selection Modal -->
    <div id="productModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Selecciona el producto correcto</h3>
          <button id="closeModalBtn" class="icon-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div id="productList" class="product-list">
          <!-- Products will be inserted here -->
        </div>
      </div>
    </div>

  </div>

  <script src="../utils/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataBunker Price Checker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo-container">
        <img src="../icons/icon32.png" alt="DataBunker" class="logo">
        <h1>DataBunker Price Checker</h1>
      </div>
      <div id="userBadge" class="user-badge hidden">
        <span id="usageCounter" class="usage-counter" title="Consultas este mes"></span>
        <span id="userEmail" class="user-email"></span>
        <button id="logoutBtn" class="logout-btn" title="Cerrar sesión">↩</button>
      </div>
    </header>

    <!-- Chat Container -->
    <div class="chat-container">
      <div id="messages" class="messages">
        <!-- Messages will appear here -->
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div id="multiDropdown" class="multi-dropdown hidden"></div>
      <div class="input-wrapper">
        <div id="multiTagsArea" class="multi-tags-area hidden"></div>
        <textarea
          id="userInput"
          placeholder="Escribe el nombre del producto o pega informacion..."
          rows="1"
        ></textarea>
        <div class="input-actions">
          <button id="multiSearchBtn" class="input-action-btn multi-search-btn" title="Búsqueda múltiple">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </button>
<button id="sendBtn" class="send-btn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>

<!-- Cognito Login Screen -->
    <div id="cognitoLoginScreen" class="activation-screen hidden">
      <div class="activation-content">
        <img src="../icons/icon48.png" alt="DataBunker" class="activation-logo">
        <h2>DataBunker Price Checker</h2>
        <p class="activation-subtitle">Inicia sesión para continuar</p>
        <div class="activation-input-wrapper">
          <input type="text" id="cognitoEmail" class="activation-input" placeholder="Usuario" autocomplete="username">
        </div>
        <div class="activation-input-wrapper password-wrapper">
          <input type="password" id="cognitoPassword" class="activation-input" placeholder="Contraseña" autocomplete="current-password">
          <button id="togglePassword" class="toggle-password" type="button" tabindex="-1">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div id="cognitoError" class="cognito-error hidden"></div>
        <button id="cognitoLoginBtn" class="activation-btn" disabled>Iniciar sesión</button>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="loading-content">
        <div class="spinner"></div>
        <p id="loadingText">Buscando precios...</p>
      </div>
    </div>

    <!-- Product Selection Modal -->
    <div id="productModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Selecciona el producto correcto</h3>
          <button id="closeModalBtn" class="icon-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div id="productList" class="product-list">
          <!-- Products will be inserted here -->
        </div>
      </div>
    </div>

  </div>

  <script src="../lib/xlsx.min.js"></script>
  <script src="../utils/cognito.js"></script>
  <script src="../utils/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
